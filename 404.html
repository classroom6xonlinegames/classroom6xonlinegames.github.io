<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2;url=/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background:#111;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .box{
            max-width:600px;
            padding:20px;
        }

        h1{
            font-size:80px;
            margin:0;
            color:#ff3c3c;
        }

        p{
            font-size:20px;
            margin-top:10px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#ff3c3c;
            color:#fff;
            text-decoration:none;
            border-radius:6px;
        }

        a:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>404</h1>
    <p>Page not found.</p>
    <p>Redirecting to homepage...</p>

    <a href="/">Go Home</a>
</div>

</body>
</html>
